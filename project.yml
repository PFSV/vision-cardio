name: VisionCardio
options:
  bundleIdPrefix: com.pfsv
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

targets:
  VisionCardio:
    type: application
    platform: iOS
    sources:
      - path: app
        excludes:
          - "**/*.md"
      - path: ui
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Vision Cardio
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSCameraUsageDescription: "심박수 추정을 위해 전면 카메라로 얼굴 영상을 분석합니다. 영상은 기기 안에서만 처리되며 외부로 전송되지 않습니다."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pfsv.visioncardio
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.0"
        IPHONEOS_DEPLOYMENT_TARGET: "16.0"
